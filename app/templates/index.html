<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Picture Upload</title>

    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <h1>Picture Upload</h1>

    <form id="uploadForm">

        <input
            type="file"
            id="fileInput"
            accept="image/*"
            required
        >

        <button type="submit">
            Upload
        </button>

    </form>

    <h2>Gallery</h2>

    <div id="gallery"></div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
